          application/json:
            schema:
              type: object
              properties:
                resolution:
                  type: string
      responses:
        "200":
          description: Ticket closed

  /api/v1/support/stats:
    get:
      tags: [Support]
      summary: Support ticket statistics
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Support stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_open:
                    type: integer
                  total_in_progress:
                    type: integer
                  avg_resolution_hours:
                    type: number
                  avg_first_response_hours:
                    type: number
                  by_priority:
                    type: object
                  by_category:
                    type: object

  # ===========================================================================
  # INVOICES
  # ===========================================================================
  /api/v1/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, paid, overdue, cancelled, refunded]
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invoices list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Invoices]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organization_id, line_items]
              properties:
                organization_id:
                  type: string
                  format: uuid
                license_id:
                  type: string
                  format: uuid
                contact_id:
                  type: string
                  format: uuid
                currency:
                  type: string
                  default: INR
                tax_rate:
                  type: number
                  description: "e.g. 18.00 for 18% GST"
                discount_amount:
                  type: number
                  default: 0
                line_items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [description, quantity, unit_price]
                    properties:
                      description:
                        type: string
                      quantity:
                        type: integer
                      unit_price:
                        type: number
                      license_type:
                        type: string
                      period:
                        type: string
                notes:
                  type: string
                terms:
                  type: string
                due_at:
                  type: string
                  format: date
      responses:
        "201":
          description: Invoice created (draft)

  /api/v1/invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get invoice details
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Invoice details
    patch:
      tags: [Invoices]
      summary: Update invoice (draft only)
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                line_items:
                  type: array
                  items:
                    type: object
                tax_rate:
                  type: number
                discount_amount:
                  type: number
                notes:
                  type: string
                terms:
                  type: string
                due_at:
                  type: string
                  format: date
      responses:
        "200":
          description: Invoice updated
        "409":
          description: Cannot update non-draft invoice

  /api/v1/invoices/{id}/send:
    post:
      tags: [Invoices]
      summary: Mark invoice as sent
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Invoice marked as sent

  /api/v1/invoices/{id}/record-payment:
    post:
      tags: [Invoices]
      summary: Record payment for invoice
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, payment_method]
              properties:
                amount:
                  type: number
                payment_method:
                  type: string
                payment_reference:
                  type: string
      responses:
        "200":
          description: Payment recorded

  /api/v1/invoices/{id}/pdf:
    get:
      tags: [Invoices]
      summary: Download invoice PDF
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # ===========================================================================
  # ADMIN USER MANAGEMENT
  # ===========================================================================
  /api/v1/admin/users:
    get:
      tags: [Admin]
      summary: List admin users
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - name: role
          in: query
          schema:
            type: string
            enum: [super_admin, admin, support, viewer, analyst]
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Admin users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUser'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Admin]
      summary: Create admin user
      description: "Requires super_admin role."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password, display_name, role]
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                password:
                  type: string
                  minLength: 12
                display_name:
                  type: string
                role:
                  type: string
                  enum: [admin, support, viewer, analyst]
      responses:
        "201":
          description: Admin user created
        "409":
          description: Email or username already taken

  /api/v1/admin/users/{id}:
    get:
      tags: [Admin]
      summary: Get admin user details
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Admin user details
    patch:
      tags: [Admin]
      summary: Update admin user
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                role:
                  type: string
                  enum: [admin, support, viewer, analyst]
                is_active:
                  type: boolean
      responses:
        "200":
          description: Admin user updated
    delete:
      tags: [Admin]
      summary: Soft-delete admin user
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "204":
          description: Admin user deleted

  /api/v1/admin/users/{id}/reset-password:
    post:
      tags: [Admin]
      summary: Force reset admin password
      description: "Requires super_admin role."
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                new_password:
                  type: string
                  minLength: 12
      responses:
        "200":
          description: Password reset

  /api/v1/admin/users/{id}/mfa:
    post:
      tags: [Admin]
      summary: Enable or reset MFA for admin user
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: MFA setup response
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                  qr_code_url:
                    type: string
                    format: uri
                  backup_codes:
                    type: array
                    items:
                      type: string
    delete:
      tags: [Admin]
      summary: Disable MFA for admin user
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: MFA disabled

  /api/v1/admin/audit-log:
    get:
      tags: [Admin]
      summary: Query admin audit log
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - name: admin_user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            type: string
        - name: resource_type
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        admin_user_id:
                          type: string
                          format: uuid
                        admin_email:
                          type: string
                        action:
                          type: string
                        resource_type:
                          type: string
                        resource_id:
                          type: string
                        description:
                          type: string
                        changes:
                          type: object
                        ip_address:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  # ===========================================================================
  # DASHBOARD
  # ===========================================================================
  /api/v1/dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Dashboard overview statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'

  /api/v1/dashboard/activity:
    get:
      tags: [Dashboard]
      summary: Recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: "license_event, ticket, download, etc."
                        title:
                          type: string
                        description:
                          type: string
                        resource_type:
                          type: string
                        resource_id:
                          type: string
                        timestamp:
                          type: string
                          format: date-time

  # ===========================================================================
  # PART B: Public Desktop App API
  # ===========================================================================

  /api/public/v1/license/activate:
    post:
      tags: [Public - License]
      summary: Activate license on a machine
      security: []
      description: |
        Called by the desktop app when a user enters their license key.
        Binds the license to the machine's hardware fingerprint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicActivateRequest'
      responses:
        "200":
          description: Activation successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicActivateResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error_code:
                    type: string
                    enum:
                      - INVALID_LICENSE_KEY
                      - LICENSE_EXPIRED
                      - LICENSE_SUSPENDED
                      - LICENSE_REVOKED
                      - MAX_ACTIVATIONS_REACHED
                      - MACHINE_ALREADY_ACTIVATED
                  message:
                    type: string
        "429":
          description: Rate limited

  /api/public/v1/license/validate:
    post:
      tags: [Public - License]
      summary: Validate license on current machine
      security: []
      description: |
        Called by the desktop app on startup and periodically to verify
        the license is still valid for this machine.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicValidateRequest'
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicValidateResponse'
        "400":
          description: Invalid request

  /api/public/v1/license/deactivate:
    post:
      tags: [Public - License]
      summary: Deactivate license from current machine
      security: []
      description: |
        Called when user wants to transfer their license to another machine.
        Frees up an activation slot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [license_key, machine_id]
              properties:
                license_key:
                  type: string
                machine_id:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Deactivation successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  activations_remaining:
                    type: integer
                  message:
                    type: string
        "400":
          description: Not activated on this machine

  /api/public/v1/heartbeat:
    post:
      tags: [Public - Telemetry]
      summary: Periodic heartbeat from desktop app
      security: []
      description: |
        Sent periodically (every 4 hours by default) by the desktop app.
        Updates last_heartbeat, collects optional metrics, and can return
        server-side commands (force update, show announcement, revoke).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicHeartbeatRequest'
      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicHeartbeatResponse'
        "401":
          description: Invalid license key

  /api/public/v1/analytics:
    post:
      tags: [Public - Telemetry]
      summary: Submit usage analytics from desktop app
      security: []
      description: |
        Accepts a batch of analytics events from the desktop app.
        Events are queued for async processing.
        Max 100 events per batch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [license_key, machine_id, events]
              properties:
                license_key:
                  type: string
                machine_id:
                  type: string
                session_id:
                  type: string
                app_version:
                  type: string
                os_platform:
                  type: string
                os_version:
                  type: string
                events:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                    required: [event_name, timestamp]
                    properties:
                      event_name:
                        type: string
                      event_category:
                        type: string
                      event_data:
                        type: object
                      timestamp:
                        type: string
                        format: date-time
      responses:
        "202":
          description: Events accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                  message:
                    type: string
        "400":
          description: Invalid payload
        "429":
          description: Rate limited

  /api/public/v1/update-check:
    post:
      tags: [Public - Updates]
      summary: Check for application updates
      security: []
      description: |
        Called by the desktop app to check if a newer version is available.
        Returns download URL and metadata if an update exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicUpdateCheckRequest'
      responses:
        "200":
          description: Update check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUpdateCheckResponse'

  /api/public/v1/announcements:
    get:
      tags: [Public - Content]
      summary: Get active announcements for desktop app
      security: []
      parameters:
        - name: app_version
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: license_key
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date-time
            description: "Only return announcements created/updated after this time"
      responses:
        "200":
          description: Active announcements
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcements:
                    type: array
                    items:
                      $ref: '#/components/schemas/PublicAnnouncementItem'

  /api/public/v1/download/{releaseId}/{platform}:
    get:
      tags: [Public - Downloads]
      summary: Download a release binary
      security: []
      description: |
        Serves the installer/binary for the requested release and platform.
        Tracks the download. Returns a redirect to the actual file URL (S3/R2
        presigned URL) or streams the file directly for local storage.
      parameters:
        - name: releaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: platform
          in: path
          required: true
          schema:
            type: string
            enum: [windows_x64, windows_arm64, linux_x64, linux_arm64, macos_x64, macos_arm64]
        - name: license_key
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to download URL
          headers:
            Location:
              schema:
                type: string
                format: uri
            X-File-SHA256:
              schema:
                type: string
            X-File-Size:
              schema:
                type: integer
        "404":
          description: Release or platform not found

  /api/public/v1/support/ticket:
    post:
      tags: [Public - Support]
      summary: Submit support ticket from desktop app
      security: []
      description: |
        Allows the desktop app to submit a support ticket directly.
        Attaches device info and optional log bundle.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [license_key, machine_id, subject, description, requester_name, requester_email]
              properties:
                license_key:
                  type: string
                machine_id:
                  type: string
                subject:
                  type: string
                description:
                  type: string
                requester_name:
                  type: string
                requester_email:
                  type: string
                  format: email
                category:
                  type: string
                  default: general
                app_version:
                  type: string
                os_info:
                  type: string
                device_info:
                  type: string
                  description: "JSON string"
                log_bundle:
                  type: string
                  format: binary
                  description: "Compressed log file (.zip)"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket_number:
                    type: string
                  message:
                    type: string
        "400":
          description: Invalid request
        "429":
          description: Rate limited
