# =============================================================================
# Cyber Chakra Forensics - Admin Portal API Specification
# OpenAPI 3.1.0
# =============================================================================
# This document defines:
#   Part A: Admin Portal REST API  (/api/v1/*)
#   Part B: Public Desktop App API (/api/public/v1/*)
# =============================================================================

openapi: "3.1.0"
info:
  title: Cyber Chakra Forensics Admin Portal API
  version: "1.0.0"
  description: |
    REST API for the CMF Admin Portal and the public-facing desktop app endpoints.
    All admin endpoints require Bearer token authentication.
    All public endpoints require a valid license key (X-License-Key header).

servers:
  - url: https://cyberchakra.online
    description: Production
  - url: https://staging.cyberchakra.online
    description: Staging

# =============================================================================
# Security Schemes
# =============================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin portal JWT token obtained from /api/v1/auth/login.

    LicenseKeyAuth:
      type: apiKey
      in: header
      name: X-License-Key
      description: License key for public desktop app endpoints.

  # ===========================================================================
  # Shared Schemas
  # ===========================================================================
  schemas:

    # ---- Pagination ----
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 25
        total:
          type: integer
          example: 142
        total_pages:
          type: integer
          example: 6
        has_next:
          type: boolean
        has_prev:
          type: boolean

    PaginationParams:
      type: object
      properties:
        page:
          type: integer
          default: 1
          minimum: 1
        per_page:
          type: integer
          default: 25
          minimum: 1
          maximum: 100
        sort_by:
          type: string
        sort_order:
          type: string
          enum: [asc, desc]
          default: desc

    # ---- Error ----
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            message:
              type: string
              example: "Invalid request parameters"
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    # ---- Organization ----
    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        org_type:
          type: string
          enum: [law_enforcement, government, forensics_lab, military, corporate, academic, individual, other]
        status:
          type: string
          enum: [active, suspended, churned, trial]
        address_line_1:
          type: string
        address_line_2:
          type: string
        city:
          type: string
        state_province:
          type: string
        postal_code:
          type: string
        country_code:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string
        gst_number:
          type: string
        pan_number:
          type: string
        notes:
          type: string
        metadata:
          type: object
        max_licenses:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrganizationCreate:
      type: object
      required: [name, org_type]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
        org_type:
          type: string
          enum: [law_enforcement, government, forensics_lab, military, corporate, academic, individual, other]
        address_line_1:
          type: string
        address_line_2:
          type: string
        city:
          type: string
        state_province:
          type: string
        postal_code:
          type: string
        country_code:
          type: string
          maxLength: 2
        phone:
          type: string
        email:
          type: string
          format: email
        website:
          type: string
          format: uri
        gst_number:
          type: string
        pan_number:
          type: string
        notes:
          type: string
        metadata:
          type: object
        max_licenses:
          type: integer
          default: 1
          minimum: 1

    OrganizationUpdate:
      type: object
      properties:
        name:
          type: string
        org_type:
          type: string
        status:
          type: string
        address_line_1:
          type: string
        address_line_2:
          type: string
        city:
          type: string
        state_province:
          type: string
        postal_code:
          type: string
        country_code:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string
        gst_number:
          type: string
        pan_number:
          type: string
        notes:
          type: string
        metadata:
          type: object
        max_licenses:
          type: integer

    # ---- Contact ----
    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
        designation:
          type: string
        department:
          type: string
        role:
          type: string
          enum: [primary, technical, billing, admin, user]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ---- License ----
    License:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        organization:
          $ref: '#/components/schemas/Organization'
        contact_id:
          type: string
          format: uuid
        license_key:
          type: string
        license_type:
          type: string
          enum: [trial, standard, professional, enterprise, government, academic, oem]
        status:
          type: string
          enum: [active, expired, suspended, revoked, pending_activation]
        issued_at:
          type: string
          format: date-time
        activated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        max_activations:
          type: integer
        current_activations:
          type: integer
        product_version:
          type: string
        features:
          type: object
        purchase_order:
          type: string
        invoice_ref:
          type: string
        notes:
          type: string
        activations:
          type: array
          items:
            $ref: '#/components/schemas/LicenseActivation'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LicenseCreate:
      type: object
      required: [organization_id, license_type, max_activations]
      properties:
        organization_id:
          type: string
          format: uuid
        contact_id:
          type: string
          format: uuid
        license_type:
          type: string
          enum: [trial, standard, professional, enterprise, government, academic, oem]
        max_activations:
          type: integer
          minimum: 1
          default: 1
        expires_at:
          type: string
          format: date-time
          description: "Null for perpetual licenses"
        product_version:
          type: string
        features:
          type: object
          description: "Feature flags for this license"
        purchase_order:
          type: string
        invoice_ref:
          type: string
        notes:
          type: string

    LicenseActivation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        license_id:
          type: string
          format: uuid
        machine_id:
          type: string
        machine_name:
          type: string
        os_info:
          type: string
        app_version:
          type: string
        ip_address:
          type: string
        is_active:
          type: boolean
        activated_at:
          type: string
          format: date-time
        deactivated_at:
          type: string
          format: date-time
        last_heartbeat:
          type: string
          format: date-time
        heartbeat_count:
          type: integer

    LicenseEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        license_id:
          type: string
          format: uuid
        activation_id:
          type: string
          format: uuid
        event_type:
          type: string
        machine_id:
          type: string
        ip_address:
          type: string
        triggered_by:
          type: string
        details:
          type: object
        created_at:
          type: string
          format: date-time

    # ---- Release ----
    Release:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: string
        version_code:
          type: integer
        channel:
          type: string
          enum: [stable, beta, alpha, nightly, lts]
        status:
          type: string
          enum: [draft, published, deprecated, yanked]
        title:
          type: string
        release_notes:
          type: string
        is_mandatory:
          type: boolean
        is_security:
          type: boolean
        published_at:
          type: string
          format: date-time
        assets:
          type: array
          items:
            $ref: '#/components/schemas/ReleaseAsset'
        created_at:
          type: string
          format: date-time

    ReleaseAsset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        release_id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [windows_x64, windows_arm64, linux_x64, linux_arm64, macos_x64, macos_arm64]
        filename:
          type: string
        file_size:
          type: integer
        content_type:
          type: string
        sha256_hash:
          type: string
        installer_type:
          type: string
        created_at:
          type: string
          format: date-time

    # ---- Announcement ----
    Announcement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        body_html:
          type: string
        announcement_type:
          type: string
          enum: [info, warning, critical, maintenance, feature, promotion]
        target:
          type: string
          enum: [all, trial, standard, professional, enterprise, government, specific_orgs]
        is_dismissible:
          type: boolean
        is_pinned:
          type: boolean
        action_url:
          type: string
        action_label:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        is_published:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ---- Support Ticket ----
    SupportTicket:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ticket_number:
          type: string
        organization_id:
          type: string
          format: uuid
        contact_id:
          type: string
          format: uuid
        license_id:
          type: string
          format: uuid
        requester_name:
          type: string
        requester_email:
          type: string
        subject:
          type: string
        description:
          type: string
        category:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, in_progress, waiting_on_customer, waiting_on_internal, resolved, closed]
        assigned_to:
          type: string
          format: uuid
        resolution:
          type: string
        device_info:
          type: object
        app_version:
          type: string
        tags:
          type: array
          items:
            type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/TicketMessage'
        created_at:
          type: string
          format: date-time

    TicketMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sender_type:
          type: string
          enum: [customer, admin, system]
        sender_name:
          type: string
        body:
          type: string
        body_html:
          type: string
        attachments:
          type: array
          items:
            type: object
        is_internal:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ---- Invoice ----
    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_number:
          type: string
        organization_id:
          type: string
          format: uuid
        license_id:
          type: string
          format: uuid
        currency:
          type: string
        subtotal:
          type: number
        tax_amount:
          type: number
        tax_rate:
          type: number
        discount_amount:
          type: number
        total:
          type: number
        amount_paid:
          type: number
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled, refunded]
        issued_at:
          type: string
          format: date
        due_at:
          type: string
          format: date
        line_items:
          type: array
          items:
            type: object
        created_at:
          type: string
          format: date-time

    # ---- Admin User ----
    AdminUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        username:
          type: string
        display_name:
          type: string
        role:
          type: string
          enum: [super_admin, admin, support, viewer, analyst]
        is_active:
          type: boolean
        mfa_enabled:
          type: boolean
        last_login_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    # ---- Analytics ----
    AnalyticsSummary:
      type: object
      properties:
        period:
          type: string
          description: "e.g., '2026-03-01/2026-03-28'"
        total_events:
          type: integer
        unique_machines:
          type: integer
        unique_sessions:
          type: integer
        acquisitions:
          type: integer
        analyses:
          type: integer
        reports:
          type: integer
        errors:
          type: integer
        daily_breakdown:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              event_count:
                type: integer
              unique_machines:
                type: integer

    # ---- Dashboard ----
    DashboardStats:
      type: object
      properties:
        active_organizations:
          type: integer
        active_licenses:
          type: integer
        expired_licenses:
          type: integer
        active_machines:
          type: integer
        open_tickets:
          type: integer
        downloads_30d:
          type: integer
        revenue_mtd:
          type: number
        licenses_expiring_soon:
          type: integer
          description: "Licenses expiring within 30 days"

    # ---- Public API schemas (desktop app) ----

    PublicActivateRequest:
      type: object
      required: [license_key, machine_id]
      properties:
        license_key:
          type: string
        machine_id:
          type: string
          description: "Hardware fingerprint hash"
        machine_name:
          type: string
        os_info:
          type: string
        app_version:
          type: string

    PublicActivateResponse:
      type: object
      properties:
        success:
          type: boolean
        activation_id:
          type: string
          format: uuid
        license_type:
          type: string
        features:
          type: object
        expires_at:
          type: string
          format: date-time
        activations_remaining:
          type: integer
        message:
          type: string

    PublicValidateRequest:
      type: object
      required: [license_key, machine_id]
      properties:
        license_key:
          type: string
        machine_id:
          type: string
        app_version:
          type: string

    PublicValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
        license_type:
          type: string
        status:
          type: string
        features:
          type: object
        expires_at:
          type: string
          format: date-time
        days_remaining:
          type: integer
        message:
          type: string

    PublicHeartbeatRequest:
      type: object
      required: [license_key, machine_id]
      properties:
        license_key:
          type: string
        machine_id:
          type: string
        app_version:
          type: string
        session_id:
          type: string
        uptime_seconds:
          type: integer
        metrics:
          type: object
          description: "Optional usage metrics snapshot"

    PublicHeartbeatResponse:
      type: object
      properties:
        ok:
          type: boolean
        server_time:
          type: string
          format: date-time
        commands:
          type: array
          items:
            type: object
            properties:
              action:
                type: string
                enum: [none, force_update, show_announcement, revoke]
              payload:
                type: object

    PublicUpdateCheckRequest:
      type: object
      required: [current_version, platform]
      properties:
        current_version:
          type: string
        platform:
          type: string
          enum: [windows_x64, windows_arm64, linux_x64, linux_arm64, macos_x64, macos_arm64]
        channel:
          type: string
          enum: [stable, beta, alpha, nightly, lts]
          default: stable
        license_key:
          type: string

    PublicUpdateCheckResponse:
      type: object
      properties:
        update_available:
          type: boolean
        is_mandatory:
          type: boolean
        is_security:
          type: boolean
        latest_version:
          type: string
        version_code:
          type: integer
        release_notes:
          type: string
        download_url:
          type: string
          format: uri
        file_size:
          type: integer
        sha256_hash:
          type: string
        published_at:
          type: string
          format: date-time

    PublicAnnouncementItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body_html:
          type: string
        announcement_type:
          type: string
        is_dismissible:
          type: boolean
        is_pinned:
          type: boolean
        action_url:
          type: string
        action_label:
          type: string
        starts_at:
          type: string
          format: date-time

  # ===========================================================================
  # Shared Parameters
  # ===========================================================================
  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QueryPage:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    QueryPerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 100
    QuerySortBy:
      name: sort_by
      in: query
      schema:
        type: string
    QuerySortOrder:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    QuerySearch:
      name: search
      in: query
      schema:
        type: string
      description: "Full-text / trigram search"

# =============================================================================
# PART A: Admin Portal REST API
# =============================================================================

security:
  - BearerAuth: []

paths:

  # ===========================================================================
  # AUTH
  # ===========================================================================
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate admin user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                mfa_code:
                  type: string
                  description: "TOTP code, required when MFA enabled"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: "JWT access token"
                  refresh_token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                  user:
                    $ref: '#/components/schemas/AdminUser'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "423":
          description: Account locked (too many failed attempts)

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refresh_token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
        "401":
          description: Invalid or expired refresh token

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      responses:
        "204":
          description: Session revoked

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current admin user profile
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'

  # ===========================================================================
  # ORGANIZATIONS
  # ===========================================================================
  /api/v1/organizations:
    get:
      tags: [Organizations]
      summary: List organizations
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - $ref: '#/components/parameters/QuerySortBy'
        - $ref: '#/components/parameters/QuerySortOrder'
        - $ref: '#/components/parameters/QuerySearch'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, churned, trial]
        - name: org_type
          in: query
          schema:
            type: string
        - name: country_code
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Organizations]
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreate'
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        "409":
          description: Organization with same slug already exists
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/organizations/{id}:
    get:
      tags: [Organizations]
      summary: Get organization by ID
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Organization'
                  - type: object
                    properties:
                      contacts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contact'
                      licenses:
                        type: array
                        items:
                          $ref: '#/components/schemas/License'
                      recent_tickets:
                        type: array
                        items:
                          $ref: '#/components/schemas/SupportTicket'
        "404":
          description: Organization not found
    patch:
      tags: [Organizations]
      summary: Update organization
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdate'
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        "404":
          description: Organization not found
        "422":
          description: Validation error
    delete:
      tags: [Organizations]
      summary: Soft-delete organization
      description: |
        Soft-deletes the organization (sets deleted_at).
        Fails if the org has active licenses.
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "204":
          description: Organization deleted
        "404":
          description: Organization not found
        "409":
          description: Cannot delete organization with active licenses

  /api/v1/organizations/{id}/contacts:
    get:
      tags: [Organizations]
      summary: List contacts for an organization
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
      responses:
        "200":
          description: Contacts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Organizations]
      summary: Create contact for organization
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email]
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                designation:
                  type: string
                department:
                  type: string
                role:
                  type: string
                  enum: [primary, technical, billing, admin, user]
                  default: user
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        "409":
          description: Contact email already exists in this org

  /api/v1/organizations/{id}/contacts/{contactId}:
    patch:
      tags: [Organizations]
      summary: Update contact
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: contactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                designation:
                  type: string
                department:
                  type: string
                role:
                  type: string
                is_active:
                  type: boolean
      responses:
        "200":
          description: Updated contact
    delete:
      tags: [Organizations]
      summary: Soft-delete contact
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: contactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Contact deleted

  # ===========================================================================
  # LICENSES
  # ===========================================================================
  /api/v1/licenses:
    get:
      tags: [Licenses]
      summary: List licenses
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - $ref: '#/components/parameters/QuerySortBy'
        - $ref: '#/components/parameters/QuerySortOrder'
        - $ref: '#/components/parameters/QuerySearch'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, expired, suspended, revoked, pending_activation]
        - name: license_type
          in: query
          schema:
            type: string
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
        - name: expiring_within_days
          in: query
          schema:
            type: integer
            description: "Filter licenses expiring within N days"
      responses:
        "200":
          description: Paginated licenses
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/License'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Licenses]
      summary: Create license
      description: |
        Creates a new license key. The key is auto-generated using a
        cryptographically secure format: CCF-XXXX-XXXX-XXXX-XXXX.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseCreate'
      responses:
        "201":
          description: License created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/License'
        "422":
          description: Validation error

  /api/v1/licenses/{id}:
    get:
      tags: [Licenses]
      summary: Get license details
      description: |
        Returns full license info including activations and recent events.
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: License details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/License'
                  - type: object
                    properties:
                      activations:
                        type: array
                        items:
                          $ref: '#/components/schemas/LicenseActivation'
                      recent_events:
                        type: array
                        items:
                          $ref: '#/components/schemas/LicenseEvent'
        "404":
          description: License not found
    patch:
      tags: [Licenses]
      summary: Update license
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                license_type:
                  type: string
                max_activations:
                  type: integer
                expires_at:
                  type: string
                  format: date-time
                product_version:
                  type: string
                features:
                  type: object
                purchase_order:
                  type: string
                notes:
                  type: string
      responses:
        "200":
          description: Updated license
        "404":
          description: License not found

  /api/v1/licenses/{id}/suspend:
    post:
      tags: [Licenses]
      summary: Suspend a license
      description: |
        Suspends an active license. All current activations are deactivated.
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: License suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/License'
        "409":
          description: License is not in a suspendable state

  /api/v1/licenses/{id}/reinstate:
    post:
      tags: [Licenses]
      summary: Reinstate a suspended license
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                extend_days:
                  type: integer
                  description: "Optionally extend expiry by N days"
      responses:
        "200":
          description: License reinstated
        "409":
          description: License is not suspended

  /api/v1/licenses/{id}/revoke:
    post:
      tags: [Licenses]
      summary: Permanently revoke a license
      description: |
        Permanently revokes a license. This is irreversible.
        All activations are terminated immediately.
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: License revoked
        "409":
          description: License already revoked

  /api/v1/licenses/{id}/renew:
    post:
      tags: [Licenses]
      summary: Renew a license
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_expires_at]
              properties:
                new_expires_at:
                  type: string
                  format: date-time
                invoice_ref:
                  type: string
      responses:
        "200":
          description: License renewed

  /api/v1/licenses/{id}/activations:
    get:
      tags: [Licenses]
      summary: List activations for a license
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: active_only
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Activations list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LicenseActivation'

  /api/v1/licenses/{id}/activations/{activationId}/deactivate:
    post:
      tags: [Licenses]
      summary: Admin-deactivate a specific machine
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: activationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Activation deactivated

  /api/v1/licenses/{id}/events:
    get:
      tags: [Licenses]
      summary: List audit events for a license
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - name: event_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: License events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LicenseEvent'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  # ===========================================================================
  # ANALYTICS
  # ===========================================================================
  /api/v1/analytics/summary:
    get:
      tags: [Analytics]
      summary: Get analytics summary
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
        - name: license_id
          in: query
          schema:
            type: string
            format: uuid
        - name: group_by
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummary'

  /api/v1/analytics/events:
    get:
      tags: [Analytics]
      summary: Query raw analytics events
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: event_name
          in: query
          schema:
            type: string
        - name: event_category
          in: query
          schema:
            type: string
        - name: license_id
          in: query
          schema:
            type: string
            format: uuid
        - name: machine_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Raw events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      description: "analytics_events row"
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /api/v1/analytics/top-features:
    get:
      tags: [Analytics]
      summary: Top features by usage
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Top features
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        event_name:
                          type: string
                        count:
                          type: integer
                        unique_machines:
                          type: integer

  /api/v1/analytics/geo:
    get:
      tags: [Analytics]
      summary: Geographic distribution of usage
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Geographic breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        country_code:
                          type: string
                        country_name:
                          type: string
                        event_count:
                          type: integer
                        unique_machines:
                          type: integer

  /api/v1/analytics/ingest:
    post:
      tags: [Analytics]
      summary: Ingest batch analytics events (internal)
      description: |
        Used by the public API relay or batch processors to insert
        pre-validated analytics events into the system.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  maxItems: 1000
                  items:
                    type: object
                    required: [event_name]
                    properties:
                      license_id:
                        type: string
                        format: uuid
                      machine_id:
                        type: string
                      session_id:
                        type: string
                      event_name:
                        type: string
                      event_category:
                        type: string
                      event_data:
                        type: object
                      app_version:
                        type: string
                      os_platform:
                        type: string
                      client_timestamp:
                        type: string
                        format: date-time
      responses:
        "202":
          description: Events accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                  rejected:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        reason:
                          type: string

  # ===========================================================================
  # RELEASES
  # ===========================================================================
  /api/v1/releases:
    get:
      tags: [Releases]
      summary: List releases
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - name: channel
          in: query
          schema:
            type: string
            enum: [stable, beta, alpha, nightly, lts]
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, deprecated, yanked]
      responses:
        "200":
          description: Releases list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Release'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Releases]
      summary: Create release (draft)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version, version_code, title]
              properties:
                version:
                  type: string
                  description: "Semver string, e.g. 2.1.0"
                version_code:
                  type: integer
                  description: "Monotonic integer for comparison"
                channel:
                  type: string
                  enum: [stable, beta, alpha, nightly, lts]
                  default: stable
                title:
                  type: string
                release_notes:
                  type: string
                  description: "Markdown"
                min_os_version:
                  type: object
                min_upgrade_from:
                  type: string
                is_mandatory:
                  type: boolean
                  default: false
                is_security:
                  type: boolean
                  default: false
      responses:
        "201":
          description: Release created in draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'
        "409":
          description: Version already exists

  /api/v1/releases/{id}:
    get:
      tags: [Releases]
      summary: Get release details
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Release with assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'
    patch:
      tags: [Releases]
      summary: Update release (draft only)
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                release_notes:
                  type: string
                channel:
                  type: string
                is_mandatory:
                  type: boolean
                is_security:
                  type: boolean
                min_os_version:
                  type: object
                min_upgrade_from:
                  type: string
      responses:
        "200":
          description: Release updated
        "409":
          description: Cannot update published release

  /api/v1/releases/{id}/publish:
    post:
      tags: [Releases]
      summary: Publish a release
      description: |
        Transitions a draft release to published status.
        Requires at least one asset to be uploaded.
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Release published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'
        "409":
          description: Release has no assets or is already published

  /api/v1/releases/{id}/deprecate:
    post:
      tags: [Releases]
      summary: Deprecate a release
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Release deprecated

  /api/v1/releases/{id}/yank:
    post:
      tags: [Releases]
      summary: Yank a release (emergency removal)
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Release yanked

  /api/v1/releases/{id}/assets:
    get:
      tags: [Releases]
      summary: List assets for a release
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Release assets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReleaseAsset'
    post:
      tags: [Releases]
      summary: Upload asset for release
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, platform, sha256_hash]
              properties:
                file:
                  type: string
                  format: binary
                platform:
                  type: string
                  enum: [windows_x64, windows_arm64, linux_x64, linux_arm64, macos_x64, macos_arm64]
                installer_type:
                  type: string
                  description: "nsis, msi, appimage, deb, dmg"
                sha256_hash:
                  type: string
                  description: "Pre-computed SHA-256 for verification"
                signature:
                  type: string
                  description: "Code-signing signature"
      responses:
        "201":
          description: Asset uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseAsset'
        "409":
          description: Asset for this platform/installer already exists
        "413":
          description: File too large
        "422":
          description: SHA-256 mismatch

  /api/v1/releases/{id}/assets/{assetId}:
    delete:
      tags: [Releases]
      summary: Delete a release asset
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Asset deleted
        "409":
          description: Cannot delete asset from published release

