          schema:
            type: string
            format: date
      responses:
        "200":
          description: Download records
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      description: "Download record with release info"
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /api/v1/downloads/stats:
    get:
      tags: [Downloads]
      summary: Download statistics
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: group_by
          in: query
          schema:
            type: string
            enum: [day, week, month, version, platform]
