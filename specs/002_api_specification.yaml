                body:
                  type: string
                announcement_type:
                  type: string
                target:
                  type: string
                target_org_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                is_dismissible:
                  type: boolean
                is_pinned:
                  type: boolean
                action_url:
                  type: string
                action_label:
                  type: string
                starts_at:
                  type: string
                  format: date-time
                ends_at:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Announcement updated
    delete:
      tags: [Announcements]
      summary: Delete announcement
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "204":
          description: Announcement deleted

  /api/v1/announcements/{id}/publish:
    post:
      tags: [Announcements]
      summary: Publish an announcement
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Announcement published

  /api/v1/announcements/{id}/unpublish:
    post:
      tags: [Announcements]
      summary: Unpublish an announcement
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Announcement unpublished

  # ===========================================================================
  # DOWNLOADS
