  # ===========================================================================
  # SUPPORT TICKETS
  # ===========================================================================
  /api/v1/support/tickets:
    get:
      tags: [Support]
      summary: List support tickets
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - $ref: '#/components/parameters/QuerySearch'
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, waiting_on_customer, waiting_on_internal, resolved, closed]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: assigned_to
          in: query
          schema:
            type: string
            format: uuid
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tickets list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SupportTicket'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Support]
      summary: Create support ticket (admin-created)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requester_name, requester_email, subject, description]
              properties:
                organization_id:
                  type: string
                  format: uuid
                contact_id:
                  type: string
                  format: uuid
                license_id:
                  type: string
                  format: uuid
                requester_name:
                  type: string
                requester_email:
                  type: string
                  format: email
                subject:
                  type: string
                description:
                  type: string
                category:
                  type: string
                  default: general
                priority:
                  type: string
                  enum: [low, medium, high, critical]
                  default: medium
                assigned_to:
                  type: string
                  format: uuid
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicket'

  /api/v1/support/tickets/{id}:
    get:
      tags: [Support]
      summary: Get ticket details with messages
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Ticket with messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicket'
    patch:
      tags: [Support]
      summary: Update ticket
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [open, in_progress, waiting_on_customer, waiting_on_internal, resolved, closed]
                priority:
                  type: string
                  enum: [low, medium, high, critical]
                assigned_to:
                  type: string
                  format: uuid
                category:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                resolution:
                  type: string
      responses:
        "200":
          description: Ticket updated

  /api/v1/support/tickets/{id}/messages:
    post:
      tags: [Support]
      summary: Add message to ticket
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  description: "Markdown content"
                is_internal:
                  type: boolean
                  default: false
